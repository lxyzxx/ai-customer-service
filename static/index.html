<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 问答机器人</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <h1>AI 问答机器人</h1>
            <p>内部知识检索、上下文核验、来源追踪</p>
          </div>
          <div id="status" class="status">连接中</div>
        </header>

        <section id="chat" class="chat" aria-live="polite"></section>

        <form id="chat-form" class="composer">
          <input id="question" name="question" placeholder="输入内部问题，例如：差旅报销流程是什么？" autocomplete="off" />
          <button type="submit">发送</button>
        </form>
      </section>

      <aside class="sidebar">
        <section class="panel">
          <h2>知识库</h2>
          <div id="documents" class="documents"></div>
        </section>

        <section class="panel">
          <h2>新增文档</h2>
          <form id="doc-form" class="doc-form">
            <input id="admin-token" placeholder="管理 Token" type="password" autocomplete="off" />
            <input id="doc-title" placeholder="文档标题" />
            <textarea id="doc-content" rows="10" placeholder="粘贴 FAQ、制度说明、流程文档或操作手册"></textarea>
            <button type="submit">入库</button>
          </form>
        </section>

        <section class="panel">
          <h2>批量导入</h2>
          <form id="batch-form" class="doc-form">
            <input id="batch-files" type="file" accept=".md,.txt,text/markdown,text/plain" multiple />
            <button type="submit">导入文件</button>
          </form>
          <div id="batch-status" class="batch-status"></div>
        </section>
      </aside>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
