<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 智能客服</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <h1>AI 智能客服</h1>
            <p>知识库问答、来源追踪、会话记忆</p>
          </div>
          <div id="status" class="status">连接中</div>
        </header>

        <section id="chat" class="chat" aria-live="polite"></section>

        <form id="chat-form" class="composer">
          <input id="question" name="question" placeholder="输入客户问题，例如：退款多久到账？" autocomplete="off" />
          <button type="submit">发送</button>
        </form>
      </section>

      <aside class="sidebar">
        <section class="panel">
          <h2>知识库</h2>
          <div id="documents" class="documents"></div>
        </section>

        <section class="panel">
          <h2>新增文档</h2>
          <form id="doc-form" class="doc-form">
            <input id="doc-title" placeholder="文档标题" />
            <textarea id="doc-content" rows="10" placeholder="粘贴 FAQ、产品说明或售后政策"></textarea>
            <button type="submit">入库</button>
          </form>
        </section>
      </aside>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
